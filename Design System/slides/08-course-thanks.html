<!-- @dsCard group="Slides" viewport="1280x720" name="Course thank-you" subtitle="End of course — thanks, certificates, review" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="./slide-frame.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../_ds_bundle.js"></script>
<style>
  body { margin: 0; display: flex; }
  .slide--thanks { background: var(--navy-600); }
  .blob { position: absolute; border-radius: 50%; }
  .ways { display: flex; gap: 18px; margin-top: 30px; }
  .review { display: flex; align-items: center; gap: 12px; margin-top: 26px; background: var(--amber-400); color: var(--navy-900); border-radius: var(--radius-pill); padding: 14px 26px; font-size: 19px; font-weight: 700; width: fit-content; }
  .review .star { font-size: 20px; }
</style>
</head>
<body>
  <section class="slide slide--dark slide--thanks">
    <div class="blob" style="width:460px;height:460px;right:-150px;bottom:-150px;background:var(--navy-500);opacity:.5"></div>

    <header class="slide__header">
      <div class="slide__brand"><img src="../assets/main/company-logo.png" alt="" /><span class="co">AI Code Academy</span></div>
      <span class="slide__num">08</span>
    </header>

    <div class="slide__body" style="display:flex;flex-direction:column;justify-content:center">
      <div class="slide__eyebrow">Course complete · Final lesson</div>
      <h1 class="slide__title" style="font-size:54px;margin-top:14px">Thank you for taking the course!</h1>
      <p class="slide__lead" style="margin-top:16px;max-width:840px">It's been a pleasure teaching you. A few last things before you go.</p>

      <div class="ways" id="ways"></div>

      <div class="review"><span class="star">★</span>Please leave me a review if you enjoyed my teaching of this course!</div>
    </div>

    <footer class="slide__footer">
      <span class="course">Template Course Name — Level 3</span>
      <span class="lesson">Lesson 0</span>
    </footer>
  </section>

  <script type="text/babel">
    const { IconDescCard } = window.DesignSystem_df7c10;
    const f = { flex: 1 };
    ReactDOM.createRoot(document.getElementById("ways")).render(
      <React.Fragment>
        <IconDescCard glass symbol="?" title="Final questions?" text="Now's the time — ask me anything before we finish." style={f} />
        <IconDescCard glass symbol="★" title="Certificates" text="Given after class by end of day, or tomorrow (if our course has them)." style={f} />
        <IconDescCard glass symbol="→" title="Good luck!" text="Good luck in your future endeavours!" style={f} />
      </React.Fragment>
    );
  </script>
</body>
</html>
