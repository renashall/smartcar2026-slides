<!-- @dsCard group="Components" viewport="700x600" name="Blocks" subtitle="Info card · icon-desc · tiers · mini checklist" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 26px 30px; background: var(--surface-page); font-family: var(--font-sans); }
  .glabel { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 10px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
  .navy { background: var(--navy-600); border-radius: var(--radius-xl); padding: 22px; }
  .lbl { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--teal-300); margin-bottom: 12px; }
  .rule { height: 1px; background: rgba(255,255,255,.15); margin: 14px 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { InfoCard, IconDescCard, TierList, MiniChecklist } = window.DesignSystem_df7c10;

    function Demo() {
      return (
        <div className="cols">
          <div className="stack">
            <div>
              <div className="glabel">InfoCard</div>
              <InfoCard badge="?" title="Questions?">If anything isn't working, ask now.</InfoCard>
            </div>
            <InfoCard eyebrow="Up next" title={<>Lesson 05<br/>Line follower</>}>Trace a black line on the floor.</InfoCard>
          </div>
          <div className="stack">
            <div>
              <div className="glabel">IconDescCard (glass)</div>
              <div className="navy" style={{ display: "flex", gap: 12 }}>
                <IconDescCard glass symbol="?" title="Final questions?" text="Ask before we finish." style={{ flex: 1 }} />
                <IconDescCard glass symbol="★" title="Certificates" text="Given after class." style={{ flex: 1 }} />
              </div>
            </div>
            <div>
              <div className="glabel">TierList + MiniChecklist</div>
              <div className="navy">
                <div className="lbl">Certificate tiers</div>
                <TierList items={[
                  { tag: "×1", label: "High Honors" },
                  { tag: "×2", label: "Honors" },
                  { tag: "all", label: "Regular — everyone else" },
                ]} />
                <div className="rule"></div>
                <MiniChecklist divided={false} items={[
                  "Post a class announcement",
                  "Note absences in #attendance",
                ]} />
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
