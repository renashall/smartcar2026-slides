<!-- @dsCard group="Components" viewport="700x860" name="Image cards" subtitle="Material tile · large image · screenshot step · video link" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 26px 30px; background: var(--surface-page); font-family: var(--font-sans); }
  .group { margin-bottom: 22px; }
  .glabel { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 12px; }
  .mgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { MaterialCard, ImageFrame, ScreenshotCard, VideoCard } = window.DesignSystem_df7c10;

    function Demo() {
      return (
        <div>
          <div className="group">
            <div className="glabel">Material card — image · name · count</div>
            <div className="mgrid">
              <MaterialCard src="../../assets/materials/raspberry-pi-4-set.png" name="Raspberry Pi 4" count="×1" note="the brain" />
              <MaterialCard src="../../assets/materials/electronic-parts/camera-module.png" name="Camera module" count="×1" note="the eyes" />
              <MaterialCard src="../../assets/materials/transmission-parts/wheel.png" name="Wheels & motors" count="×4" note="drive" />
            </div>
          </div>

          <div className="group">
            <div className="glabel">Large image — no title, no padding</div>
            <div style={{ height: 200 }}>
              <ImageFrame src="../../assets/main/smart-car-full.png" fit="contain" background="var(--neutral-50)" pad />
            </div>
          </div>

          <div className="group">
            <div className="glabel">Screenshot — step badge + caption</div>
            <ScreenshotCard
              src="../../assets/screenshots/raspberry-pi-connect.png"
              step={1}
              caption="Slide the microSD card into the Raspberry Pi until it clicks into place." />
          </div>

          <div className="group">
            <div className="glabel">Video link — clickable poster + play overlay + linked subtitle</div>
            <div style={{ width: 420, height: 300 }}>
              <VideoCard
                src="../../assets/main/smart-car-full.png"
                thumbSrc="../../assets/main/smart-car-full.png"
                href="https://drive.google.com/file/d/1fl8dAGgtttkPZFmboovwltMmlfYszNP7/view?usp=share_link"
                title="Watch the smart car build video"
                meta="Google Drive · build & setup walkthrough" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
