<!-- @dsCard group="Brand" viewport="700x220" name="Logo" subtitle="AI mark on navy · clear space = the amber dot" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 20px; }
  .tile { flex: 1; border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 22px; border: 1px solid var(--border-subtle); }
  .tile img { width: 96px; height: 96px; }
  .cap { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .word { display: flex; align-items: center; gap: 14px; }
  .word .name { font-size: 22px; font-weight: 800; color: var(--text-strong); letter-spacing: -0.02em; line-height: 1.1; }
  .word .name small { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.04em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="row">
    <div class="tile" style="background:var(--surface-card)">
      <img src="../assets/main/company-logo.png" alt="AI Code Academy logo" />
      <span class="cap">Primary mark</span>
    </div>
    <div class="tile" style="background:var(--neutral-50)">
      <div class="word">
        <img src="../assets/main/company-logo.png" alt="" style="width:64px;height:64px" />
        <span class="name">AI Code Academy<small>Learn by building</small></span>
      </div>
      <span class="cap">Horizontal lockup</span>
    </div>
    <div class="tile" style="background:var(--navy-600)">
      <img src="../assets/main/company-logo.png" alt="AI Code Academy logo on navy" style="background:#fff;border-radius:22px;padding:12px;box-sizing:border-box" />
      <span class="cap" style="color:var(--teal-200)">On navy — white tile backing</span>
    </div>
  </div>
</body>
</html>
