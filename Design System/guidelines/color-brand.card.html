<!-- @dsCard group="Colors" viewport="700x190" name="Brand colors" subtitle="Navy, teal & amber — the AI Code Academy core trio" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; gap: 16px; }
  .sw { flex: 1; border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
  .chip { height: 96px; display: flex; align-items: flex-end; padding: 12px; }
  .meta { padding: 10px 12px; background: var(--surface-card); }
  .name { font-weight: 700; color: var(--text-strong); font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); text-transform: uppercase; }
  .tag { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: var(--navy-600);"><span class="tag" style="background:#ffffff2e;color:#fff;">Primary</span></div>
      <div class="meta"><div class="name">Navy</div><div class="hex">#224289</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--teal-300);"><span class="tag" style="background:#1321420f;color:var(--navy-900);">Secondary</span></div>
      <div class="meta"><div class="name">Teal</div><div class="hex">#61cbc8</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: var(--amber-400);"><span class="tag" style="background:#1321420f;color:var(--navy-900);">Accent</span></div>
      <div class="meta"><div class="name">Amber</div><div class="hex">#fcb600</div></div>
    </div>
  </div>
</body>
</html>
