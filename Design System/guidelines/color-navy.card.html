<!-- @dsCard group="Colors" viewport="700x130" name="Navy scale" subtitle="Primary — surfaces, text, primary actions" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { flex: 1; height: 76px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-mono); font-size: 10px; font-weight: 500; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--navy-50);color:#132142">50</div>
    <div class="step" style="background:var(--navy-100);color:#132142">100</div>
    <div class="step" style="background:var(--navy-200);color:#132142">200</div>
    <div class="step" style="background:var(--navy-300);color:#132142">300</div>
    <div class="step" style="background:var(--navy-400);color:#fff">400</div>
    <div class="step" style="background:var(--navy-500);color:#fff">500</div>
    <div class="step" style="background:var(--navy-600);color:#fff">600</div>
    <div class="step" style="background:var(--navy-700);color:#fff">700</div>
    <div class="step" style="background:var(--navy-800);color:#fff">800</div>
    <div class="step" style="background:var(--navy-900);color:#fff">900</div>
    <div class="step" style="background:var(--navy-950);color:#fff">950</div>
  </div>
</body>
</html>
