<!-- @dsCard group="Colors" viewport="700x130" name="Amber scale" subtitle="Accent — emphasis dots, badges, call-outs (use sparingly)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .ramp { display: flex; border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--shadow-sm); }
  .step { flex: 1; height: 76px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; font-family: var(--font-mono); font-size: 10px; font-weight: 500; }
</style>
</head>
<body>
  <div class="ramp">
    <div class="step" style="background:var(--amber-50);color:#653f12">50</div>
    <div class="step" style="background:var(--amber-100);color:#653f12">100</div>
    <div class="step" style="background:var(--amber-200);color:#653f12">200</div>
    <div class="step" style="background:var(--amber-300);color:#653f12">300</div>
    <div class="step" style="background:var(--amber-400);color:#653f12">400</div>
    <div class="step" style="background:var(--amber-500);color:#fff">500</div>
    <div class="step" style="background:var(--amber-600);color:#fff">600</div>
    <div class="step" style="background:var(--amber-700);color:#fff">700</div>
    <div class="step" style="background:var(--amber-800);color:#fff">800</div>
    <div class="step" style="background:var(--amber-900);color:#fff">900</div>
  </div>
</body>
</html>
