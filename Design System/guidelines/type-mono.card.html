<!-- @dsCard group="Type" viewport="700x180" name="Code & terminal" subtitle="JetBrains Mono — lessons, commands & output" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-card); }
  .term { background: var(--surface-code); border-radius: var(--radius-md); padding: 16px 18px; font-family: var(--font-mono); font-size: 13.5px; line-height: 1.7; box-shadow: var(--shadow-md); }
  .term .prompt { color: var(--teal-300); }
  .term .cmd { color: #e8eaed; }
  .term .out { color: var(--neutral-400); }
  .term .kw { color: var(--amber-300); }
</style>
</head>
<body>
  <div class="term">
    <div><span class="prompt">pi@smartcar:~ $</span> <span class="cmd">cd Code/User</span></div>
    <div><span class="prompt">pi@smartcar:~ $</span> <span class="cmd">sudo python3 lesson_1_components.py</span></div>
    <div><span class="out">LEDs ready · motors ready · </span><span class="kw">press Ctrl+C to stop</span></div>
  </div>
</body>
</html>
