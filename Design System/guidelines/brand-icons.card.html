<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 28px; background: var(--surface-card); }

  .ic { display: flex; flex-direction: column; align-items: center; gap: 7px; }
  .ic img { width: 40px; height: 40px; object-fit: contain; }
  .ic span { font-family: var(--font-mono); font-size: 9.5px; color: var(--text-muted); text-align: center; line-height: 1.2; }
</style>
</head>
<body>
  <div class="row">
    <div class="ic"><img src="../assets/icons/car-black.png" alt=""><span>car</span></div>

    <div class="ic"><img src="../assets/icons/wifi.png" alt=""><span>wifi</span></div>
    <div class="ic"><img src="../assets/icons/server-client-black.png" alt=""><span>server-client</span></div>
    <div class="ic"><img src="../assets/icons/technology.png" alt=""><span>technology</span></div>
    <div class="ic"><img src="../assets/icons/config-wheel-black.png" alt=""><span>config-wheel</span></div>
