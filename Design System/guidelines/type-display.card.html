<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="Rubik — friendly geometric sans, tight tracking" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: baseline; gap: 14px; border-bottom: 1px solid var(--border-subtle); padding: 10px 0; }
  .row:last-child { border-bottom: 0; }
  .spec { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); white-space: nowrap; }
  .hero { font-size: 56px; font-weight: 800; color: var(--text-strong); letter-spacing: var(--tracking-tight); line-height: 1; }
  .h1 { font-size: 40px; font-weight: 700; color: var(--text-strong); letter-spacing: var(--tracking-tight); }
  .h2 { font-size: 28px; font-weight: 600; color: var(--text-strong); }
</style>
</head>
<body>
  <div class="row"><span class="hero">Drive &amp; learn</span><span class="spec">800 · 56–88px</span></div>
  <div class="row"><span class="h1">Build your smart car</span><span class="spec">700 · 48px</span></div>
  <div class="row"><span class="h2">Lesson 4 — Autonomous modes</span><span class="spec">600 · 28–36px</span></div>
</body>
</html>
