<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radius" subtitle="Soft, rounded — sm 8 → 2xl 32 → pill" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 16px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 70px; background: var(--navy-100); border: 2px solid var(--navy-600); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .pill { width: 110px; border-radius: var(--radius-pill); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl">xs · 4</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl">sm · 8</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl">md · 12</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl">lg · 16</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl">xl · 24</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lbl">2xl · 32</span></div>
    <div class="item"><div class="box pill"></div><span class="lbl">pill</span></div>
  </div>
</body>
</html>
