<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Success, warning, error & info — for feedback states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; gap: 14px; }
  .cell { flex: 1; border-radius: var(--radius-md); padding: 14px; border: 1px solid var(--border-subtle); }
  .dot { width: 26px; height: 26px; border-radius: var(--radius-circle); margin-bottom: 10px; }
  .lbl { font-weight: 700; color: var(--text-strong); font-size: 14px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="cell" style="background:var(--status-success-bg)">
      <div class="dot" style="background:var(--status-success)"></div>
      <div class="lbl">Success</div><div class="hex">--status-success</div>
    </div>
    <div class="cell" style="background:var(--status-warning-bg)">
      <div class="dot" style="background:var(--status-warning)"></div>
      <div class="lbl">Warning</div><div class="hex">--status-warning</div>
    </div>
    <div class="cell" style="background:var(--status-error-bg)">
      <div class="dot" style="background:var(--status-error)"></div>
      <div class="lbl">Error</div><div class="hex">--status-error</div>
    </div>
    <div class="cell" style="background:var(--status-info-bg)">
      <div class="dot" style="background:var(--status-info)"></div>
      <div class="lbl">Info</div><div class="hex">--status-info</div>
    </div>
  </div>
</body>
</html>
