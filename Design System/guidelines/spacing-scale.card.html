<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4 / 8px grid — space-1 → space-12" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px 32px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--teal-300); border-radius: var(--radius-xs); width: 100%; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
  .item { width: 38px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="lbl">4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="lbl">8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="lbl">12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="lbl">16</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="lbl">24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="lbl">32</span></div>
    <div class="item"><div class="bar" style="height:40px"></div><span class="lbl">40</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="lbl">48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="lbl">64</span></div>
  </div>
</body>
</html>
